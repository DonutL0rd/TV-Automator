# ── TV-Automator Docker Compose ──────────────────────────────────
# Runs on an Ubuntu server with HDMI output to a monitor.
#
# Prerequisites:
#   1. X11 running on the host:  xhost +local:docker
#   2. (Optional) GPU drivers for hardware video decoding
#
# Usage:
#   docker compose up -d
#   Open http://<server-ip>:5000/ in any browser to control playback.
# ─────────────────────────────────────────────────────────────────

services:
  tv-automator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tv-automator

    # Host network: simplest path for X11 access and nginx on port 80
    network_mode: host

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - /run/user/1000:/run/user/1000:ro   # covers gdm3 X auth + PulseAudio
      - tv-automator-data:/data

    env_file:
      - ../.env

    environment:
      - DISPLAY=${DISPLAY:-:0}
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - DATA_DIR=/data
      - TZ=America/Los_Angeles

    devices:
      - /dev/dri:/dev/dri

    shm_size: 512mb

    restart: unless-stopped

volumes:
  tv-automator-data:
    driver: local
